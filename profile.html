<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Профиль</title>
	<link rel="stylesheet" href="css/style.css">
	<link rel="stylesheet" href="css/splide-core.min.css">
</head>

<body class="profile_page">
	<header>
		<div class="container">
			<a href="index.html" class="logo">
				<img src="img/icons/logo.svg" alt="">

			<a href="" class="generations">
				<img src="img/icons/generation-icon.svg" alt="">
				<span>2</span>
			</a>
			<a href="profile.html" class="profile">
				<div class="profile-avatar">
					<img src="img/avatar.png" alt="">
				</div>
				<div class="profile-nickname">Сергей Леонов</div>
			</a>
		</div>
	</header>

	<main>
		<div class="container">
			<h1 class="title">Привет, Сергей Леонов!</h1>
		</div>

		<section class="info">
			<div class="container">
				<article class="balance _mobile">
					<div>
						<div class="balance__count">390</div>
						<div class="balance__text">Баланс токенов</div>
					</div>
					<a href="shop.html" class="balance__button">Пополнить</a>
				</article>

				<div class="left">
					<h2 class="archive-title">
						Архив фото
						<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
							<path d="M9 6L14.2929 11.2929C14.6834 11.6834 14.6834 12.3166 14.2929 12.7071L9 18" stroke="#06B8EA"
								stroke-linecap="round" stroke-linejoin="round" />
						</svg>
					</h2>

						<a href="index.html" class="take-photo">
							<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
								<path d="M12 6L12 18" stroke="#06B8EA" stroke-linecap="round" />
								<path d="M18 12L6 12" stroke="#06B8EA" stroke-linecap="round" />
							</svg>
							<span>Сделать фото</span>
						</a>
						<img src="img/food-5.png" loading="lazy" alt="">
						<img src="img/food-5.png" loading="lazy" alt="">
						<img src="img/food-5.png" loading="lazy" alt="">
					</div>
				</div>
				<div class="right">
					<article class="balance _desktop">
						<div class="balance__count">390</div>
						<div class="balance__text">Баланс токенов</div>
						<a href="shop.html" class="balance__button">Пополнить</a>
					</article>
					<a href="" class="history">
						<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
							<path
								d="M16 3C18.8284 3 20.2424 3.00023 21.1211 3.87891C21.9998 4.75759 22 6.17157 22 9V11H16C14.3431 11 13 12.3431 13 14C13 15.6569 14.3431 17 16 17H22C22 17.93 21.9997 18.3949 21.8975 18.7764C21.6201 19.8116 20.8116 20.6201 19.7764 20.8975C19.3949 20.9997 18.93 21 18 21H8C5.17157 21 3.75759 20.9998 2.87891 20.1211C2.00023 19.2424 2 17.8284 2 15V9C2 6.17157 2.00023 4.75759 2.87891 3.87891C3.75759 3.00023 5.17157 3 8 3H16ZM7 7C6.44772 7 6 7.44772 6 8C6 8.55228 6.44772 9 7 9H10C10.5523 9 11 8.55228 11 8C11 7.44772 10.5523 7 10 7H7Z"
								fill="#7E7E7E" />
							<path d="M17 14H16" stroke="white" stroke-width="2" stroke-linecap="round" />
						</svg>
						<span>История пополнений</span>
					</a>
					<a href="auth.html" class="logout">Выйти</a>

			</div>
		</section>

	<script src="js/index.js"></script>

</html>
